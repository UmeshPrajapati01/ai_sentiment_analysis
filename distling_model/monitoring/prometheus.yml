global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'fastapi_backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'distill-ai-backend'

  - job_name: 'training_pipeline'
    static_configs:
      - targets: ['host.docker.internal:8001']
        labels:
          service: 'training-pipeline'
