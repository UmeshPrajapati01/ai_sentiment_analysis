{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12 text-center mb-4">
        <h1>Welcome, {{ current_user.email }}!</h1>
        <p class="lead">Upload an mage or Audio file to detect your cat's emotion.</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Emotion Detection</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label"><strong>Select Input Type:</strong></label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="file_type" id="type_image" value="image"
                                checked>
                            <label class="btn btn-outline-primary" for="type_image">Image (JPG/PNG)</label>

                            <input type="radio" class="btn-check" name="file_type" id="type_audio" value="audio">
                            <label class="btn btn-outline-primary" for="type_audio">Audio (MP3/WAV)</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="file" class="form-label"><strong>Upload File:</strong></label>
                        <input type="file" class="form-control" id="file" name="file" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-lg btn-success">Analyze Emotion</button>
                    </div>
                </form>

                {% if prediction %}
                <div class="mt-5 text-center p-4 bg-light rounded border">
                    <h3>Prediction Result:</h3>
                    <h1 class="display-4 text-primary">{{ prediction }}</h1>

                    <div class="mt-3">
                        <!-- Fun GIF based on emotion could go here if we tracked emotion types -->
                        <img src="{{ url_for('get_asset', filename='cute-animated-cat-tutorial.gif') }}"
                            alt="Result Cat" style="width: 200px;">
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
