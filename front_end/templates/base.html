<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="{% block description %}MewConnect — AI-powered cat emotion recognition platform.{% endblock %}">
  <meta name="theme-color" content="#0a0d14">
  <title>{% block title %}MewConnect{% endblock %}</title>

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">

  {% block extra_head %}{% endblock %}
</head>

<body data-page="{% block page_id %}{% endblock %}">

  {% block body %}{% endblock %}

  <!-- Flash Messages (from Flask) -->
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      {% for category, message in messages %}
      showToast('{{ message | e }}', '{{ "error" if category in ["danger","warning"] else "success" }}');
      {% endfor %}
    });
  </script>
  {% endif %}
  {% endwith %}

  <!-- Main Script -->
  <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>

</html>
