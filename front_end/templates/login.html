{% extends "base.html" %}

{% block title %}Login - Cat Emotion Detector{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-5">
            <!-- Login Card with Modern Design -->
            <div class="card border-0 shadow-lg" style="animation-delay: 0.1s;">
                <!-- Card Header with Gradient -->
                <div class="card-header text-center">
                    <div class="mb-3">
                        <img src="{{ url_for('serve_assets', filename='white-cute-cat-hearts.gif') }}" alt="Cat Login"
                            style="width: 120px; height: 120px; object-fit: cover; margin: -60px auto 0; display: block; border-radius: 50%; border: 5px solid white; box-shadow: 0 8px 24px rgba(0,0,0,0.2);">
                    </div>
                    <h2 class="mt-4 mb-0" style="font-family: 'Poppins', sans-serif; font-weight: 700;">Welcome Back!
                    </h2>
                    <p class="mb-0" style="opacity: 0.9; font-size: 0.95rem;">Sign in to detect cat emotions</p>
                </div>

                <!-- Card Body -->
                <div class="card-body">
                    <form method="POST" action="{{ url_for('login') }}">
                        <!-- Email Input -->
                        <div class="mb-4">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope-fill me-2"></i>Email Address
                            </label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email"
                                placeholder="your.email@gmail.com" required autocomplete="email">
                        </div>

                        <!-- Password Input -->
                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock-fill me-2"></i>Password
                            </label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password"
                                placeholder="Enter your password" required autocomplete="current-password">
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>

                        <!-- Divider -->
                        <div class="text-center my-3">
                            <div
                                style="height: 1px; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);">
                            </div>
                        </div>

                        <!-- Register Link -->
                        <p class="text-center mb-0">
                            <span class="text-muted">New to Cat Emotion Detector?</span>
                            <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold ms-2"
                                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                                Create Account
                            </a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- Security Note -->
            <div class="text-center mt-4">
                <p class="text-white-50" style="font-size: 0.875rem;">
                    <i class="bi bi-shield-check me-2"></i>
                    Your data is protected with industry-standard encryption
                </p>
            </div>
        </div>
    </div>
</div>

<!-- Add Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
{% endblock %}
